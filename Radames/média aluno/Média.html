<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Média</title>
    <link rel="stylesheet" href="mediacss.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Cálculo de Média</h2>
            <p>Sistema de avaliação acadêmica</p>
        </div>

        <div class="form-body">
            <div class="section-title">Identificação</div>

            <div class="field">
                <label for="nome">Nome do aluno</label>
                <input type="text" id="nome" placeholder="Ex: João Silva">
            </div>

            <div class="field">
                <label for="ra">RA</label>
                <input type="text" id="ra" placeholder="Ex: 12345">
            </div>

            <div class="section-title">Notas</div>

            <div class="notas-grid">
                <div class="field">
                    <label for="nota1">Nota 1</label>
                    <input type="number" id="nota1" placeholder="0–10" min="0" max="10" step="0.1">
                </div>
                <div class="field">
                    <label for="nota2">Nota 2</label>
                    <input type="number" id="nota2" placeholder="0–10" min="0" max="10" step="0.1">
                </div>
                <div class="field">
                    <label for="nota3">Nota 3</label>
                    <input type="number" id="nota3" placeholder="0–10" min="0" max="10" step="0.1">
                </div>
                <div class="field">
                    <label for="nota4">Nota 4</label>
                    <input type="number" id="nota4" placeholder="0–10" min="0" max="10" step="0.1">
                </div>
            </div>

            <div class="section-title">Exercícios</div>

            <div class="field">
                <label for="ME">Média de exercícios (ano)</label>
                <input type="number" id="ME" placeholder="0–10" min="0" max="10" step="0.1">
            </div>

            <button id="verificarnota" onclick="funccalcalcular()">Calcular média</button>
        </div>

        <div id="saida"></div>
    </div>

    <script src="mediajs.js"></script>
</body>
</html>
